name: Extension AI Analysis - Prepare

# SECURITY: This workflow runs on the pull_request event, which means it executes
# code from the contributor's fork but has NO access to repository secrets.
# Its only job is to identify the changed JSON files and pass them as an artifact
# to the "Extension AI Analysis" workflow, which holds the INFERENCE_API_KEY.
#
# This two-workflow split prevents a malicious PR from modifying
# scripts/extension_ai_analysis.py to exfiltrate the API key, because that script
# is only ever executed by the companion workflow from the trusted base repository.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout PR code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Get changed JSON files
        run: |
          mkdir -p /tmp/ai-analysis-data/json_files

          # Save PR number so the analysis workflow can reference the PR
          echo "${{ github.event.pull_request.number }}" > /tmp/ai-analysis-data/pr_number.txt

          # Collect added/modified JSON files in the repo root only
          git diff --name-only --diff-filter=AM \
            "origin/${{ github.event.pull_request.base.ref }}...HEAD" \
            | grep -E '^[^/]+\.json$' > /tmp/ai-analysis-data/changed_files.txt || true

          echo "Changed JSON files:"
          cat /tmp/ai-analysis-data/changed_files.txt || echo "(none)"

          # Copy the changed JSON files into the artifact directory
          while IFS= read -r file; do
            [ -f "$file" ] && cp "$file" /tmp/ai-analysis-data/json_files/
          done < /tmp/ai-analysis-data/changed_files.txt

      - name: Upload analysis data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ai-analysis-data
          path: /tmp/ai-analysis-data/
          retention-days: 1
